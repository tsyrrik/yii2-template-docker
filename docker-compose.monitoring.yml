x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://127.0.0.1:${APP_LOKI_PORT:-3100}/loki/api/v1/push"
    mode: "non-blocking"
    keep-file: "true"
    loki-retries: "2"
    loki-max-backoff: "800ms"
    loki-timeout: "1s"

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  # kics-scan ignore-block
  php:
    logging: *loki-logging

  # kics-scan ignore-block
  nginx:
    logging: *loki-logging

  # kics-scan ignore-block
  db:
    logging: *loki-logging

  # kics-scan ignore-block
  redis:
    logging: *loki-logging

  # kics-scan ignore-block
  rabbitmq:
    logging: *loki-logging

  mysql-exporter:
    <<: *security-defaults
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "exporter:exporter@(db:3306)/"
    ports:
      - "127.0.0.1:${APP_MYSQL_EXPORTER_PORT:-9104}:9104"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9104/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis-exporter:
    <<: *security-defaults
    image: oliver006/redis_exporter:v1.63.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "127.0.0.1:${APP_REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "/redis_exporter", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rabbitmq-exporter:
    <<: *security-defaults
    image: kbudde/rabbitmq-exporter:1.0.0
    restart: unless-stopped
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: "${RABBITMQ_USER}"
      RABBIT_PASSWORD: "${RABBITMQ_PASSWORD}"
    ports:
      - "127.0.0.1:${APP_RABBITMQ_EXPORTER_PORT:-9419}:9419"
    depends_on:
      - rabbitmq
    healthcheck:
      test: ["CMD", "/rabbitmq_exporter", "-check-url", "http://127.0.0.1:9419/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  php-fpm-exporter:
    <<: *security-defaults
    image: hipages/php-fpm_exporter:2.2.0
    restart: unless-stopped
    command:
      - "--phpfpm.scrape-uri=tcp://php:9000/fpm-status"
    ports:
      - "127.0.0.1:${APP_PHP_FPM_EXPORTER_PORT:-9253}:9253"
    depends_on:
      - php
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9253/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    <<: *security-defaults
    image: prom/prometheus:v2.53.1
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:${APP_PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - mysql-exporter
      - redis-exporter
      - rabbitmq-exporter
      - php-fpm-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    <<: *security-defaults
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${APP_GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${APP_GRAFANA_ADMIN_PASSWORD}"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  loki:
    <<: *security-defaults
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:${APP_LOKI_PORT:-3100}:3100"
    volumes:
      - ./docker/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  loki-data:
