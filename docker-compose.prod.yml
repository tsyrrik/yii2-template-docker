# Production overrides.
services:
  # kics-scan ignore-block
  php:
    image: ${APP_NAME:-platform}-php:prod
    build:
      target: prod
    volumes: !reset []

  # kics-scan ignore-block
  nginx:
    volumes: !reset []

  # kics-scan ignore-block
  db:
    ports: !reset []

  # kics-scan ignore-block
  redis:
    ports: !reset []

  # kics-scan ignore-block
  rabbitmq:
    ports: !reset []

  mysql-backup:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    build:
      context: .
      dockerfile: docker/mysql-backup/Dockerfile
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      MYSQL_BACKUP_CRON: "${MYSQL_BACKUP_CRON:-17 3 * * *}"
      MYSQL_BACKUP_RUN_ON_START: "${MYSQL_BACKUP_RUN_ON_START:-0}"
      MYSQL_BACKUP_DIR: /backups
      MYSQL_BACKUP_KEEP_DAYS: "${MYSQL_BACKUP_KEEP_DAYS:-14}"
      MYSQL_BACKUP_PREFIX: "${MYSQL_BACKUP_PREFIX:-mysql}"
      MYSQL_BACKUP_NAME: "${MYSQL_BACKUP_NAME:-${DB_NAME}}"
      MYSQL_BACKUP_S3_ENABLED: "${MYSQL_BACKUP_S3_ENABLED:-0}"
      MYSQL_BACKUP_S3_ENDPOINT: "${MYSQL_BACKUP_S3_ENDPOINT:-}"
      MYSQL_BACKUP_S3_REGION: "${MYSQL_BACKUP_S3_REGION:-}"
      MYSQL_BACKUP_S3_BUCKET: "${MYSQL_BACKUP_S3_BUCKET:-}"
      MYSQL_BACKUP_S3_ACCESS_KEY: "${MYSQL_BACKUP_S3_ACCESS_KEY:-}"
      MYSQL_BACKUP_S3_SECRET_KEY: "${MYSQL_BACKUP_S3_SECRET_KEY:-}"
      MYSQL_BACKUP_S3_PREFIX: "${MYSQL_BACKUP_S3_PREFIX:-mysql}"
      MYSQL_BACKUP_S3_KEEP_DAYS: "${MYSQL_BACKUP_S3_KEEP_DAYS:-14}"
      MYSQL_BACKUP_S3_PATH_STYLE: "${MYSQL_BACKUP_S3_PATH_STYLE:-1}"
    volumes:
      - ./var/backups:/backups:rw
    depends_on:
      db:
        condition: service_healthy
