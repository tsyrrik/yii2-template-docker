# Yii2 Basic template stack (PHP-FPM 8.3, nginx, MySQL 8.0, Redis, RabbitMQ)
# Development:
#   docker compose up -d
#   docker compose exec php bash
#
# Optional monitoring:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  php:
    <<: *security-defaults
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DATABASE: ${REDIS_DATABASE}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
    volumes:
      - .:/var/www/app:rw,delegated
      - ./docker/php/conf/php.ini:/usr/local/etc/php/conf.d/zz-app.ini:ro
      - ./docker/php/conf/xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug.ini:ro
      - ./docker/php/conf/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro
      - ./docker/php/conf/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    <<: *security-defaults
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8080}:8080"
    volumes:
      - ./web:/var/www/app/web:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/fpm-ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # kics-scan ignore-block
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${APP_DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql:rw
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/app.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${APP_REDIS_MEMORY_LIMIT:-512mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${APP_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "127.0.0.1:${APP_RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${APP_RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "/opt/rabbitmq/sbin/rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  db-data:
