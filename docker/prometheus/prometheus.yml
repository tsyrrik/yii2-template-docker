global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: mysql
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq-exporter:9419']

  - job_name: php-fpm
    static_configs:
      - targets: ['php-fpm-exporter:9253']
